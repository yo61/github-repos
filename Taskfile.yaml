---
# https://taskfile.dev

version: '3'

set: [errexit, nounset, pipefail]

vars:
  PLAN_FILE: tfplan.json

tasks:
  default:
    cmds:
      - task --list
    silent: true

  plan:
    desc: Generate a plan file via `stategraph tf plan --out {{.PLAN_FILE}}`
    cmds:
      - stategraph tf plan --out {{.PLAN_FILE}}

  apply:
    desc: Apply the previously generated plan file
    cmds:
      - stategraph tf apply {{.PLAN_FILE}}

  state:list:
    desc: List resource instance addresses in state
    vars:
      STATE_ID:
        sh: stategraph states resolve
    cmds:
      - >-
        stategraph sql query "SELECT address FROM instances WHERE state_id = '{{.STATE_ID}}' ORDER BY
        address" #magic___^_^___line
  state:show:
    desc: Show all resource instances for one repo (REPO=<name>)
    requires:
      vars: [REPO]
    vars:
      STATE_ID:
        sh: stategraph states resolve
    cmds:
      - >-
        stategraph sql query "SELECT address, status FROM instances WHERE state_id = '{{.STATE_ID}}' AND
        address LIKE 'module.org_yo61.module.repo[\"{{.REPO}}\"]%'" #magic___^_^___line
  lockfile:sync:
    desc: Sync the lockfile for all supported platforms
    cmds:
      - |
        terraform providers lock \
          -platform=linux_amd64 \
          -platform=darwin_amd64 \
          -platform=linux_arm64 \
          -platform=darwin_arm64
